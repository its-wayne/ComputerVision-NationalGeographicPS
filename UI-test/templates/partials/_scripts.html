            {/* Stats bar */}
            <div className="flex items-center gap-0 flex-shrink-0 border-b"
                 style={{backgroundColor: C.card, borderColor: C.border}}>
              {status ? (<>
                {[
                  {label: 'Mission',    value: status.mission_id || '—', mono: true, accent: true},
                  {label: 'Progress',   value: `${status.videos_done} / ${status.videos_total || '?'} videos`, mono: true},
                  {label: 'Tracks',     value: status.tracks_found, mono: true},
                  {label: 'Embeddings', value: status.embeddings_total, mono: true},
                  ...(status.errors?.length > 0 ? [{label: 'Errors', value: status.errors.length, mono: true, err: true}] : []),
                ].map((s, i) => (
                  <div key={i} className="flex flex-col px-5 py-3" style={{borderRight: `1px solid var(--border-subtle)`}}>
                    <span className="label-caps mb-1">{s.label}</span>
                    <span className="font-mono text-[14px]" style={{color: s.err ? 'var(--error)' : s.accent ? C.accent : 'var(--text-primary)'}}>{s.value}</span>
                  </div>
                ))}
                <div className="flex items-center gap-2 ml-auto px-5">
                  <div style={{
                    width: 8, height: 8, borderRadius: '50%',
                    backgroundColor: running ? 'var(--success)' : done ? '#60a5fa' : 'var(--text-faint)',
                    boxShadow: running ? '0 0 6px var(--success)' : 'none',
                    animation: running ? 'pulse-dot 1.5s ease-in-out infinite' : 'none',
                  }} />
                  <span className="text-xs" style={{color: running ? 'var(--success)' : 'var(--text-muted)'}}>
                    {running ? 'Running' : done ? 'Complete' : 'Idle'}
                  </span>
                </div>
              </>) : (
                <span className="text-sm px-5 py-3" style={{color: 'var(--text-faint)'}}>No pipeline run yet this session</span>
              )}
            </div>

            {/* Current video progress */}
            {status?.current_video && (
              <div className="px-6 py-3 flex-shrink-0 border-b" style={{backgroundColor: C.bg, borderColor: C.border}}>
                <div className="flex items-center justify-between mb-2">
                  <div className="font-mono text-[13px]" style={{color: 'var(--text-primary)'}}>{status.current_video}</div>
                  {status.frame_progress && (
                    <span className="font-mono text-[11px]" style={{color: 'var(--text-muted)'}}>
                      frame {status.frame_progress.current.toLocaleString()} / {status.frame_progress.total.toLocaleString()}
                    </span>
                  )}
                </div>
                {/* 3-segment bar: detecting | extracting | embedding */}
                <div className="flex gap-0.5" style={{height: 6}}>
                  {[
                    {label: 'Detecting',  stageStart: 0,   stageEnd: 1/3},
                    {label: 'Extracting', stageStart: 1/3, stageEnd: 2/3},
                    {label: 'Embedding',  stageStart: 2/3, stageEnd: 1},
                  ].map(({label, stageStart, stageEnd}, i) => {
                    const pct = status.video_stage_pct ?? 0;
                    const fill = Math.min(Math.max((pct - stageStart) / (stageEnd - stageStart), 0), 1);
                    const isActive = pct >= stageStart && pct < stageEnd;
                    return (
                      <div key={label} style={{
                        flex: 1,
                        position: 'relative',
                        overflow: 'hidden',
                        borderRadius: i === 0 ? '3px 0 0 3px' : i === 2 ? '0 3px 3px 0' : 0,
                        backgroundColor: 'var(--bg-surface-3)',
                      }}>
                        <div style={{
                          position: 'absolute', inset: 0,
                          transform: `scaleX(${fill})`,
                          transformOrigin: 'left',
                          backgroundColor: isActive ? C.accent : (fill >= 1 ? 'var(--success)' : C.accent),
                          transition: 'transform 0.4s ease',
                        }} />
                      </div>
                    );
                  })}
                </div>
                {/* Stage labels */}
                <div className="flex mt-1" style={{fontSize: 10}}>
                  {['Detecting', 'Extracting', 'Embedding'].map((label, i) => {
                    const stagePcts = [0, 1/3, 2/3];
                    const pct = status.video_stage_pct ?? 0;
                    const done = pct >= stagePcts[i] + 1/3;
                    const active = pct >= stagePcts[i] && pct < stagePcts[i] + 1/3;
                    return (
                      <span key={label} style={{
                        flex: 1,
                        textAlign: i === 0 ? 'left' : i === 2 ? 'right' : 'center',
                        color: active ? C.accent : done ? 'var(--success)' : 'var(--text-faint)',
                        fontWeight: active ? 500 : 400,
                      }}>{label}</span>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Overall progress bar */}
            {status?.videos_total > 0 && (
              <div className="px-6 pt-4 flex-shrink-0">
                <div className="flex justify-between items-center mb-2">
                  <span className="label-caps">Overall mission progress</span>
                  <span className="font-mono text-[12px]" style={{color: 'var(--text-muted)'}}>{progress}%</span>
                </div>
                <div style={{height: 8, backgroundColor: 'var(--bg-surface-3)', borderRadius: 'var(--radius-sm)'}}>
                  <div style={{
                    width: `${progress}%`, height:'100%',
                    backgroundColor: done ? 'var(--success)' : C.accent,
                    borderRadius: 'var(--radius-sm)',
                    transition:'width 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
                  }} />
                </div>
              </div>
            )}

            {/* Error list */}
            {status?.errors?.length > 0 && (
              <div className="px-6 pt-3 flex-shrink-0">
                <div className="label-caps mb-2" style={{color: 'var(--error)'}}>
                  Errors ({status.errors.length})
                </div>
                <div className="rounded p-2 overflow-y-auto max-h-24"
                     style={{backgroundColor: 'var(--error-bg)', border:`1px solid var(--error-border)`}}>
                  {status.errors.map((e, i) => (
                    <div key={i} className="font-mono text-[11px]" style={{color:'#fca5a5', lineHeight: 1.7}}>
                      [{e.video}] {e.error}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Log window */}
            <div className="flex-1 min-h-0 px-6 pt-3 pb-4 flex flex-col">
              <div className="label-caps mb-2">Output log</div>
              <div ref={logRef}
                   className="flex-1 overflow-y-auto rounded p-3 font-mono"
                   style={{backgroundColor:'#010810', border:`1px solid var(--border-subtle)`, fontSize: 12, lineHeight: 1.7}}>
                {log.length === 0
                  ? <span style={{color:'var(--text-ghost)'}}>No output yet. Start the pipeline to begin.</span>
                  : log.map((line, i) => (
                    <div key={i} style={{
                      color: line.includes('✓') ? 'var(--success)'
                           : line.includes('✗') || line.includes('ERROR') || line.includes('FATAL') ? 'var(--error)'
                           : line.includes('→') ? C.accent
                           : 'var(--text-secondary)',
                    }}>{line}</div>
                  ))
                }
              </div>
            </div>

            {/* Done banner */}
            {done && (
              <div className="px-6 pb-4 flex-shrink-0">
                <div className="rounded-lg p-4 flex items-center justify-between"
                     style={{backgroundColor:'var(--success-bg)', border:`1px solid var(--success-border)`}}>
                  <div>
                    <div className="font-medium text-sm" style={{color:'var(--success)'}}>Pipeline complete</div>
                    <div className="font-mono text-[11px] mt-0.5" style={{color:'#86efac'}}>
                      {status.videos_done} videos · {status.embeddings_total} embeddings ready
                    </div>
                  </div>
                  {onGoToReview && (
                    <button
                      onClick={() => onGoToReview(status.mission_id)}
                      className="text-xs px-3 py-1.5 rounded font-medium transition-colors hover:opacity-80"
                      style={{
                        backgroundColor: 'var(--success-border)',
                        color: 'var(--success)',
                        border: '1px solid var(--success)',
                        cursor: 'pointer',
                        fontFamily: 'inherit',
                      }}
                    >
                      Switch to Cluster Review →
                    </button>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────

    function App() {
      const [appState, setAppState]   = useState(null);
      const [videos, setVideos]       = useState([]);
      const [video, setVideo]         = useState(null);
      const [tracks, setTracks]       = useState([]);
      const [openCluster, setOpen]    = useState(null);
      const [threshold, setThreshold] = useState(0.25);
      const [loading, setLoading]     = useState(false);
      const [contextMenu, setContextMenu] = useState(null);
      const [cropViewer, setCropViewer]   = useState(null);
      const [trashOpen, setTrashOpen]     = useState(false);
      const [statsOpen, setStatsOpen]     = useState(false);
      const [view, setView]               = useState('review');
      const [reviewMissions, setReviewMissions]           = useState([]);
      const [currentReviewMission, setCurrentReviewMission] = useState('');
      const [stripHeight, setStripHeight] = useState(() => Math.round(window.innerHeight / 2.5));
      const [selectedKeys, setSelectedKeys] = useState(new Set());
      const [visibleClusterIds, setVisibleClusterIds] = useState(new Set());

      useEffect(() => {
        if (!appState?.clusters) return;
        setVisibleClusterIds(prev => {
          const allIds = Object.keys(appState.clusters);
          const next = new Set(prev);
          allIds.forEach(id => next.add(id));
          [...next].forEach(id => { if (!appState.clusters[id]) next.delete(id); });
          return next;
        });
      }, [appState?.clusters]);

      const toggleClusterVisibility = useCallback(clusterId => {
        setVisibleClusterIds(prev => {
          const next = new Set(prev);
          if (next.has(clusterId)) next.delete(clusterId); else next.add(clusterId);
          return next;
        });
      }, []);

      const toggleAllClusters = useCallback((currentlyAllVisible) => {
        if (currentlyAllVisible) {
          setVisibleClusterIds(new Set());
        } else {
          setVisibleClusterIds(new Set(Object.keys(appState?.clusters || {})));
        }
      }, [appState?.clusters]);

      const handleSelect = useCallback(trackKey => {
        setSelectedKeys(prev => {
          const next = new Set(prev);
          if (next.has(trackKey)) next.delete(trackKey); else next.add(trackKey);
          return next;
        });
      }, []);
      const clearSelection = useCallback(() => setSelectedKeys(new Set()), []);
      const [videoHeight, setVideoHeight] = useState(300);
      const dragging        = useRef(false);
      const dragStartY      = useRef(0);
      const dragStartH      = useRef(0);
      const draggingVideo   = useRef(false);
      const dragStartVideoY = useRef(0);
      const dragStartVideoH = useRef(0);

      useEffect(() => {
        const onMove = e => {
          if (dragging.current) {
            const delta = e.clientY - dragStartY.current;
            setStripHeight(Math.max(80, Math.min(dragStartH.current + delta, window.innerHeight - 220)));
          }
          if (draggingVideo.current) {
            const delta = e.clientY - dragStartVideoY.current;
            setVideoHeight(Math.max(300, Math.min(dragStartVideoH.current + delta, window.innerHeight - 220)));
          }
        };
        const onUp = () => {
          dragging.current = false;
          draggingVideo.current = false;
          document.body.style.cursor = '';
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
      }, []);

      useEffect(() => {
        if (openCluster && appState && !appState.clusters?.[openCluster]) {
          setOpen(null);
        }
      }, [appState, openCluster]);

      const refresh = useCallback(async () => {
        const [state, vids] = await Promise.all([get('/api/state'), get('/api/videos')]);
        setAppState(state);
        setVideos(vids);
        return state;
      }, []);

      const fetchReviewMissions = useCallback(async () => {
        try {
          const ms = await get('/api/review/missions');
          if (!Array.isArray(ms)) return;
          setReviewMissions(ms);
          const cur = ms.find(m => m.is_current);
          if (cur) setCurrentReviewMission(cur.mission_id);
        } catch (_) {}
      }, []);

      useEffect(() => {
        if (view === 'review') fetchReviewMissions();
      }, [view, fetchReviewMissions]);

      const handleSwitchMission = useCallback(async (missionId) => {
        if (!missionId || missionId === currentReviewMission) return;
        await post('/api/select-review-mission', { mission_id: missionId });
        setCurrentReviewMission(missionId);
        setVideo(null);
        setTracks([]);
        setOpen(null);
        await refresh();
      }, [currentReviewMission, refresh]);

      const handleGoToReview = useCallback(async (missionId) => {
        if (missionId) {
          try {
            await post('/api/select-review-mission', { mission_id: missionId });
            setCurrentReviewMission(missionId);
          } catch (_) {}
        }
        setVideo(null);
        setTracks([]);
        setOpen(null);
        await refresh();
        setView('review');
      }, [refresh]);

      useEffect(() => {
        refresh().then(s => { if (s.initialized && s.current_video) handleResume(s); });
      }, []);

      useEffect(() => {
        if (!video) return;
        get(`/api/video/${video}/tracks`).then(setTracks);
      }, [video, appState]);

      const handleInitialize = async params => {
        setLoading(true);
        try {
          const state = await post('/api/initialize', params);
          setAppState(state);
          setVideos(await get('/api/videos'));
          setVideo(params.seed_video);
        } finally {
          setLoading(false);
        }
      };

      const handleResume = useCallback(async (state) => {
        const cv = state.current_video;
        if (!cv) return;
        const videoStatus = state.videos?.[cv]?.status;
        if (videoStatus === 'pending') {
          setLoading(true);
          setTracks([]);
          setVideo(cv);
          try {
            const nextState = await post('/api/process-video', {
              video_name: cv,
              threshold: state.cosine_threshold ?? 0.25,
            });
            setAppState(nextState);
            setVideos(await get('/api/videos'));
          } finally {
            setLoading(false);
          }
        } else {
          setVideo(cv);
        }
      }, []);

      const handleReassign = async (trackKeyOrKeys, targetClusterId) => {
        const dropped = Array.isArray(trackKeyOrKeys) ? trackKeyOrKeys : [trackKeyOrKeys];
        const keys = [...new Set([...dropped, ...selectedKeys])];
        setTracks(prev => prev.map(t => keys.includes(t.track_key) ? {...t, cluster_id: targetClusterId} : t));
        const state = await post('/api/reassign', {track_keys: keys, target_cluster_id: targetClusterId});
        setAppState(state);
        setVideos(await get('/api/videos'));
        setSelectedKeys(new Set());
      };

      const handleProcess = async () => {
        setLoading(true);
        try {
          setAppState(await post('/api/process-video', {video_name: video, threshold}));
          setVideos(await get('/api/videos'));
        } finally { setLoading(false); }
      };

      const handlePrevious = async () => {
        if (!video) return;
        setLoading(true);
        try {
          const state = await post('/api/previous', {video_name: video});
          setAppState(state);
          setVideos(await get('/api/videos'));
          const prevVideo = state.current_video;
          if (prevVideo) {
            setTracks([]);
            setVideo(prevVideo);
          }
        } finally {
          setLoading(false);
        }
      };

      const handleApprove = async () => {
        const state = await post('/api/approve', {video_name: video});
        setAppState(state);

        const currentVideos = await get('/api/videos');
        setVideos(currentVideos);

        const nextVideoName = state.current_video;
        if (nextVideoName) {
          setLoading(true);
          setTracks([]);
          setVideo(nextVideoName);

          const nextVidObj = currentVideos.find(v => v.name === nextVideoName);
          const isPending = nextVidObj && nextVidObj.status === 'pending';

          if (isPending) {
            try {
              const nextState = await post('/api/process-video', {video_name: nextVideoName, threshold});
              setAppState(nextState);
              setVideos(await get('/api/videos'));
            } finally {
              setLoading(false);
            }
          } else {
            setLoading(false);
          }
        }
      };

      const handleRename = async (clusterId, name) => {
        setAppState(await post('/api/rename', {cluster_id: clusterId, name}));
      };

      const handleVideoSelect = useCallback(async (videoName) => {
        const vidObj = videos.find(v => v.name === videoName);
        if (vidObj?.status === 'pending') {
          setLoading(true);
          setTracks([]);
          setVideo(videoName);
          try {
            const nextState = await post('/api/process-video', { video_name: videoName, threshold });
            setAppState(nextState);
            setVideos(await get('/api/videos'));
          } finally {
            setLoading(false);
          }
        } else {
          setVideo(videoName);
        }
      }, [videos, threshold]);

      const handleReset = async () => {
        if (!window.confirm('Reset all clustering? This cannot be undone.')) return;
        const state = await post('/api/reset', {});
        setAppState(state);
        setVideos(await get('/api/videos'));
        setVideo(null);
        setTracks([]);
        setOpen(null);
      };

      const handleTrashAdd = async (trackKeyOrKeys) => {
        const keys = Array.isArray(trackKeyOrKeys) ? trackKeyOrKeys : [trackKeyOrKeys];
        const allKeys = [...new Set([...keys, ...(selectedKeys.has(keys[0]) ? [...selectedKeys] : [])])];
        const state = await post('/api/trash/add', { track_keys: allKeys });
        setAppState(state);
        setVideos(await get('/api/videos'));
        setTracks(prev => prev.filter(t => !allKeys.includes(t.track_key)));
        setSelectedKeys(new Set());
      };

      const handleTrashRestore = async (trackKeys) => {
        const state = await post('/api/trash/restore', { track_keys: trackKeys });
        setAppState(state);
        setVideos(await get('/api/videos'));
        if (video) {
          const updatedTracks = await get(`/api/video/${video}/tracks`);
          setTracks(updatedTracks);
        }
      };

      const handleTrashDelete = async (trackKeys) => {
        const state = await post('/api/trash/delete', { track_keys: trackKeys });
        setAppState(state);
        setVideos(await get('/api/videos'));
      };

      const openContextMenu = useCallback((trackKey, x, y, currentClusterId) => {
        setContextMenu({ trackKey, x, y, currentClusterId });
      }, []);

      const handleContextMenuSelect = async (trackKey, clusterId) => {
        setContextMenu(null);
        const keys = selectedKeys.has(trackKey) ? [...selectedKeys] : [trackKey];
        await handleReassign(keys, clusterId);
      };

      const handleNewCluster = async trackKeyOrKeys => {
        setContextMenu(null);
        const keys = Array.isArray(trackKeyOrKeys) ? trackKeyOrKeys : [trackKeyOrKeys];
        let state = await post('/api/new-cluster', {track_key: keys[0]});
        if (keys.length > 1) {
          const newCid = state.track_assignments[keys[0]];
          state = await post('/api/reassign', {track_keys: keys.slice(1), target_cluster_id: newCid});
        }
        setAppState(state);
        setVideos(await get('/api/videos'));
        setTracks(prev => prev.map(t =>
          keys.includes(t.track_key) ? {...t, cluster_id: state.track_assignments[t.track_key]} : t
        ));
        setSelectedKeys(new Set());
      };

      if (!appState && view === 'review') return (
        <div className="h-screen flex items-center justify-center" style={{color: 'var(--text-muted)'}}>Loading...</div>
      );

      const clusters = Object.values(appState?.clusters || {});
      const videoStatus = appState?.videos?.[video]?.status;
      const canProcess = appState?.initialized && video && videoStatus === 'pending';
      const trackColorMap = {};
      const trackToCluster = {};
      tracks.forEach(t => {
        trackColorMap[t.track_id] = appState?.clusters?.[t.cluster_id]?.color || '#6B7280';
        trackToCluster[String(t.track_id)] = t.cluster_id;
      });

      return (
        <div className="flex flex-col h-screen" style={{backgroundColor: C.bg}}>

          {/* ── Top nav ── */}
          <div className="flex items-center flex-shrink-0 border-b px-4 gap-4"
               style={{height: 52, backgroundColor: C.card, borderColor: C.border}}>

            {/* Logo */}
            <div className="flex items-center gap-2 flex-shrink-0" style={{marginRight: 8}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style={{color: C.accent}}>
                <path d="M2 12C2 12 5 6 12 6C19 6 22 12 22 12C22 12 19 18 12 18C5 18 2 12 2 12Z" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                <circle cx="12" cy="12" r="2.5" fill="currentColor"/>
              </svg>
              <span className="text-sm font-semibold" style={{color: 'var(--text-primary)'}}>
                NatGeo <span style={{color: C.accent}}>Species</span>
              </span>
            </div>

            {/* Pill tab switcher */}
            <div className="flex items-center rounded-full p-1 gap-0.5" style={{backgroundColor: 'var(--bg-surface-3)', border: '1px solid var(--border-subtle)'}}>
              {['pipeline', 'review'].map(v => (
                <button key={v} onClick={() => setView(v)}
                  className="px-4 py-1 rounded-full text-[13px] font-medium transition-all"
                  style={{
                    backgroundColor: view === v ? 'var(--bg-surface-2)' : 'transparent',
                    color: view === v ? 'var(--text-primary)' : 'var(--text-muted)',
                    border: view === v ? '1px solid var(--border-moderate)' : '1px solid transparent',
                    cursor: 'pointer',
                  }}>
                  {v === 'pipeline' ? 'Pipeline' : 'Cluster Review'}
                </button>
              ))}
            </div>

            {/* Status badge */}
            {appState?.initialized && videos.length > 0 && (
              <div className="ml-auto font-mono text-[11px] px-2.5 py-1 rounded" style={{backgroundColor: 'var(--bg-surface-3)', color: 'var(--text-secondary)', border: '1px solid var(--border-subtle)'}}>
                {videos.filter(v => v.status === 'approved').length}/{videos.length} approved
              </div>
            )}
          </div>

          {/* ── View content ── */}
          {view === 'pipeline' ? (
            <PipelineView onGoToReview={handleGoToReview} />
          ) : (
            <div className="flex flex-1 min-h-0 overflow-hidden" onClick={clearSelection}>
              <VideoList videos={videos} selected={video} onSelect={handleVideoSelect}
                missions={reviewMissions} currentMission={currentReviewMission} onMissionChange={handleSwitchMission} />

              <div className="flex flex-col flex-1 min-w-0">
                {!appState?.initialized ? (
                  <InitPanel videos={videos} onInitialize={handleInitialize} />
                ) : (<>

              {/* Header */}
              <div className="flex items-center gap-3 px-4 py-2.5 flex-shrink-0 border-b" style={{backgroundColor: C.card, borderColor: C.border}}>
                <span className="font-medium text-[14px]" style={{color: 'var(--text-primary)'}}>{video || 'Select a video'}</span>
                {videoStatus && (
                  <span className="font-mono text-[11px] px-2 py-0.5 rounded-full" style={{
                    backgroundColor: videoStatus === 'approved' ? 'var(--success-bg)' : videoStatus === 'processed' ? 'rgba(86,168,224,0.1)' : 'var(--bg-surface-3)',
                    color: videoStatus === 'approved' ? 'var(--success)' : videoStatus === 'processed' ? C.accent : 'var(--text-secondary)',
                    border: `1px solid ${videoStatus === 'approved' ? 'var(--success-border)' : videoStatus === 'processed' ? 'var(--accent-dim)' : 'var(--border-subtle)'}`,
                  }}>
                    {videoStatus}
                  </span>
                )}
                <span className="ml-auto font-mono text-[11px]" style={{color: 'var(--text-faint)'}}>{tracks.length} tracks</span>
                <button
                  onClick={handleReset}
                  className="btn-ghost"
                  style={{color: 'var(--error)', borderColor: 'var(--error-border)'}}
                >
                  Restart
                </button>
              </div>

              {/* Scrollable body */}
              <div className="flex-1 overflow-y-auto flex flex-col">

              {/* Video player */}
              {video && <>
                <div className="flex flex-shrink-0 border-b" style={{height: videoHeight, borderColor: C.border, gap: 12}}>
                  <ClusterFilterPanel
                    clusters={clusters}
                    tracks={tracks}
                    visibleClusterIds={visibleClusterIds}
                    onToggle={toggleClusterVisibility}
                    onToggleAll={toggleAllClusters}
                    onStatsClick={() => setStatsOpen(true)}
                  />
                  <VideoPlayer video={video} height={videoHeight} showAnnotations={true} selectedKeys={selectedKeys} trackColorMap={trackColorMap} visibleClusterIds={visibleClusterIds} trackToCluster={trackToCluster} />
                  <div style={{width: 220, flexShrink: 1}} />
                </div>
                <div
                  onMouseDown={e => {
                    draggingVideo.current = true;
                    dragStartVideoY.current = e.clientY;
                    dragStartVideoH.current = videoHeight;
                    document.body.style.cursor = 'row-resize';
                    e.preventDefault();
                  }}
                  className="flex-shrink-0 flex items-center justify-center transition-colors hover:bg-slate-800"
                  style={{height: 6, cursor: 'row-resize', backgroundColor: 'var(--border-subtle)', borderTop: `1px solid var(--border-moderate)`, borderBottom: `1px solid var(--border-moderate)`}}
                >
                  <div style={{width: 32, height: 2, borderRadius: 1, backgroundColor: 'var(--border-moderate)'}} />
                </div>
              </>}

              {/* Crop strip */}
              <div className="flex-shrink-0" style={{backgroundColor: C.card, height: stripHeight, overflowY: 'auto'}}>
                {loading
                  ? <div className="flex items-center justify-center h-full gap-2">
                      <svg className="animate-spin" style={{width:16,height:16,color:C.accent}} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle style={{opacity:0.25}} cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                        <path style={{opacity:0.75}} fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                      </svg>
                      <span className="text-sm" style={{color: 'var(--text-faint)'}}>Processing video...</span>
                    </div>
                  : tracks.length === 0
                  ? <div className="flex items-center justify-center h-full">
                      <span className="text-sm" style={{color: 'var(--text-faint)'}}>No tracks for this video</span>
                    </div>
                  : (() => {
                      const real = clusters.filter(c => c.id !== 'noise').sort((a, b) => a.id.localeCompare(b.id));
                      const noise = clusters.find(c => c.id === 'noise');
                      const row = c => (
                        <ClusterRow key={`${video}-${c.id}`} cluster={c}
                          tracks={tracks.filter(t => t.cluster_id === c.id)}
                          onContextMenu={openContextMenu} onDrop={handleReassign}
                          selectedKeys={selectedKeys} onSelect={handleSelect} />
                      );
                      return [
                        ...real.map(row),
                        <NewClusterRow key="__new__" onDrop={handleNewCluster} />,
                        ...(noise ? [row(noise)] : []),
                      ];
                    })()
                }
              </div>

              {/* Resizer */}
              <div
                onMouseDown={e => {
                  dragging.current = true;
                  dragStartY.current = e.clientY;
                  dragStartH.current = stripHeight;
                  document.body.style.cursor = 'row-resize';
                  e.preventDefault();
                }}
                className="flex-shrink-0 flex items-center justify-center transition-colors hover:bg-slate-800"
                style={{height: 6, cursor: 'row-resize', backgroundColor: 'var(--border-subtle)', borderTop: `1px solid var(--border-moderate)`, borderBottom: `1px solid var(--border-moderate)`}}
              >
                <div style={{width: 32, height: 2, borderRadius: 1, backgroundColor: 'var(--border-moderate)'}} />
              </div>

              {/* Cluster grid */}
              <div className="p-4">
                <div className="grid gap-3" style={{gridTemplateColumns: 'repeat(auto-fill, minmax(148px, 1fr))'}}>
                  {[
                    ...clusters.filter(c => c.id !== 'noise').sort((a, b) => a.id.localeCompare(b.id)),
                    ...clusters.filter(c => c.id === 'noise'),
                  ].map(cluster => (
                    <ClusterCard
                      key={cluster.id}
                      cluster={cluster}
                      onClick={setOpen}
                      onDrop={handleReassign}
                      onRename={handleRename}
                    />
                  ))}
                  <TrashCard
                    trash={appState?.trash || { track_keys: [] }}
                    onClick={() => setTrashOpen(true)}
                  />
                </div>
              </div>

              </div>{/* end scrollable body */}

              {/* Action bar */}
              <div className="flex items-center gap-4 px-4 flex-shrink-0 border-t" style={{height: 52, backgroundColor: C.card, borderColor: C.border}}>
                <label className="flex items-center gap-3">
                  <span className="label-caps">Threshold</span>
                  <input
                    type="range" min="0.05" max="0.5" step="0.01"
                    value={threshold}
                    onChange={e => setThreshold(+e.target.value)}
                    className="w-28"
                  />
                  <span className="font-mono text-[13px] w-8 text-right" style={{color: C.accent}}>{threshold.toFixed(2)}</span>
                </label>
                <div className="flex gap-2 ml-auto">
                  <button
                    onClick={handlePrevious}
                    disabled={!video || loading}
                    className="btn-secondary"
                  >
                    ← Previous
                  </button>
                  <button
                    onClick={handleApprove}
                    disabled={!video || loading}
                    className="btn-primary"
                    style={(!video || loading) ? {} : {backgroundColor: 'var(--success-bg)', borderColor: 'var(--success-border)', color: 'var(--success)'}}
                  >
                    {loading ? 'Processing...' : 'Approve & Next ✓'}
                  </button>
                </div>
              </div>

            </>)}
              </div>
            </div>
          )}

          {openCluster && appState?.clusters?.[openCluster] && (
            <ClusterModal
              cluster={appState.clusters[openCluster]}
              onClose={() => setOpen(null)}
              onDrop={handleReassign}
              onRename={handleRename}
              onContextMenu={openContextMenu}
              dimmed={!!cropViewer}
              selectedKeys={selectedKeys} onSelect={handleSelect}
            />
          )}
          {cropViewer && <CropViewer trackKey={cropViewer} onClose={() => setCropViewer(null)} />}
          {statsOpen && video && (
            <VideoStatsModal
              video={video}
              clusters={clusters}
              onClose={() => setStatsOpen(false)}
            />
          )}
          {trashOpen && (
            <TrashModal
              trash={appState?.trash || { track_keys: [], metadata: {} }}
              onClose={() => setTrashOpen(false)}
              onRestore={handleTrashRestore}
              onDelete={handleTrashDelete}
            />
          )}
          {contextMenu && (
            <ContextMenu
              {...contextMenu}
              clusters={clusters}
              onSelect={handleContextMenuSelect}
              onNewCluster={handleNewCluster}
              onView={setCropViewer}
              onTrash={handleTrashAdd}
              onClose={() => setContextMenu(null)}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
{% endraw %}
