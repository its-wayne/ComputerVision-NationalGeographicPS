{% raw %}
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const C = {
      bg:     'var(--bg-base)',
      card:   'var(--bg-surface)',
      border: 'var(--border-subtle)',
      hover:  'var(--accent-dim)',
      accent: 'var(--accent)',
    };

    // ── Inline SVG icons (no CDN dependency) ─────────────────────────────────
    const Icons = {
      Check:        (p={}) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||12} height={p.size||12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      Circle:       (p={}) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||12} height={p.size||12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/></svg>,
      Activity:     (p={}) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||12} height={p.size||12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
      Trash2:       (p={}) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="m19 6-.867 12.142A2 2 0 0 1 16.138 20H7.862a2 2 0 0 1-1.995-1.858L5 6m5 0V4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2"/></svg>,
      X:            (p={}) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      Plus:         (p={}) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Search:       (p={}) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      ChevronRight: (p={}) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||10} height={p.size||10} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
      BarChart2:    (p={}) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>,
    };

    const get  = url  => fetch(url).then(r => r.json());
    const post = (url, body) => fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    }).then(r => r.json());

    const cropUrl = trackKey => {
      const [video, tid] = trackKey.split('__');
      return `/api/crop/${video}/${tid}`;
    };

    // ── VideoList ─────────────────────────────────────────────────────────────

    function VideoList({ videos, selected, onSelect, missions, currentMission, onMissionChange }) {
      const approved = videos.filter(v => v.status === 'approved').length;
      return (
        <div className="flex flex-col flex-shrink-0 overflow-hidden border-r" style={{width: 220, backgroundColor: C.card, borderColor: C.border}}>
          {missions && missions.length > 0 && (
            <div className="px-3 py-2 border-b" style={{borderColor: C.border}}>
              <div className="label-caps mb-1.5">Mission</div>
              <select
                value={currentMission || ''}
                onChange={e => onMissionChange && onMissionChange(e.target.value)}
                style={{
                  width: '100%',
                  backgroundColor: 'var(--bg-surface-3)',
                  border: '1px solid var(--border-moderate)',
                  color: 'var(--text-primary)',
                  borderRadius: 4,
                  padding: '4px 6px',
                  fontSize: 12,
                  fontFamily: 'inherit',
                  cursor: 'pointer',
                }}
              >
                {missions.map(m => (
                  <option key={m.mission_id} value={m.mission_id}>{m.mission_id}</option>
                ))}
              </select>
            </div>
          )}
          <div className="px-3 py-2.5 flex items-center justify-between border-b" style={{borderColor: C.border}}>
            <span className="label-caps">Video Queue</span>
            <span className="font-mono text-[10px]" style={{color: 'var(--text-faint)'}}>{approved}/{videos.length}</span>
          </div>
          <div className="overflow-y-auto flex-1">
            {videos.map(v => {
              const isSel = selected === v.name;
              return (
                <button
                  key={v.name}
                  onClick={() => onSelect(v.name)}
                  className="w-full text-left px-3 py-2 transition-colors"
                  style={{
                    backgroundColor: isSel ? 'var(--bg-surface-2)' : 'transparent',
                    borderLeft: isSel ? '3px solid var(--accent)' : '3px solid transparent',
                  }}
                >
                  <div className="flex items-center gap-2">
                    <span style={{color: v.status === 'approved' ? 'var(--success)' : v.status === 'processed' ? C.accent : 'var(--text-faint)', display: 'inline-flex', alignItems: 'center'}}>
                      {v.status === 'approved' ? <Icons.Check size={11}/> : v.status === 'processed' ? <Icons.Activity size={11}/> : <Icons.Circle size={11}/>}
                    </span>
                    <span className="truncate text-[13px] font-medium" style={{color: isSel ? 'var(--text-primary)' : 'var(--text-secondary)'}}>{v.name}</span>
                  </div>
                  <div className="ml-[19px] font-mono text-[11px]" style={{color: 'var(--text-faint)'}}>{v.track_count} tracks</div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    // ── CropViewer ────────────────────────────────────────────────────────────

    function CropViewer({ trackKey, onClose }) {
      useEffect(() => {
        const onKey = e => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [onClose]);

      return (
        <div
          className="fixed inset-0 flex flex-col items-center justify-center modal-backdrop"
          style={{backgroundColor: 'var(--bg-overlay)', backdropFilter: 'blur(8px)', zIndex: 60}}
          onClick={onClose}
        >
          <div
            className="flex flex-col items-center gap-3"
            onClick={e => e.stopPropagation()}
          >
            <img
              src={cropUrl(trackKey)}
              alt={trackKey}
              className="rounded-lg"
              style={{maxWidth: '80vw', maxHeight: '80vh', objectFit: 'contain', boxShadow: 'var(--shadow-modal)'}}
            />
            <span className="font-mono text-[11px]" style={{color: 'var(--text-muted)'}}>{trackKey}</span>
          </div>
          <button onClick={onClose} className="btn-icon absolute top-4 right-5" style={{padding: '8px'}}>
            <Icons.X size={18}/>
          </button>
        </div>
      );
    }

    // ── VideoPlayer ───────────────────────────────────────────────────────────

    const CLASS_COLORS = {
      fish:      '#60A5FA',
      eel:       '#FBBF24',
      shark:     '#F87171',
      animal:    '#A78BFA',
      jellyfish: '#F472B6',
      crab:      '#34D399',
    };

    function getVideoRect(videoEl, canvasEl) {
      const cw = canvasEl.width,  ch = canvasEl.height;
      const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
      if (!vw || !vh) return { x: 0, y: 0, w: cw, h: ch };
      const scale = Math.min(cw / vw, ch / vh);
      const rw = vw * scale, rh = vh * scale;
      return { x: (cw - rw) / 2, y: (ch - rh) / 2, w: rw, h: rh };
    }

    function VideoPlayer({ video, height, showAnnotations, selectedKeys, trackColorMap, visibleClusterIds, trackToCluster }) {
      const [status,        setStatus]        = useState('missing');
      const [detections,    setDetections]    = useState({});
      const [fps,           setFps]           = useState(30);
      const [blackDuration, setBlackDuration] = useState(0);
      const videoRef = useRef(null);
      const canvasRef = useRef(null);

      useEffect(() => {
        if (!video) return;
        setStatus('missing');
        setDetections({});
        fetch(`/api/video/${video}/proxy/start`, { method: 'POST' })
          .then(r => r.json()).then(d => setStatus(d.status));
        const iv = setInterval(() => {
          fetch(`/api/video/${video}/proxy-status`)
            .then(r => r.json())
            .then(d => {
              setStatus(d.status);
              if (d.status === 'ready' || d.status === 'error') clearInterval(iv);
            });
        }, 3000);
        return () => clearInterval(iv);
      }, [video]);

      useEffect(() => {
        if (status !== 'ready' || !video) return;
        get(`/api/video/${video}/detections`).then(data => {
          setFps(data.fps);
          setBlackDuration(data.black_duration || 0);
          setDetections(data.detections);
        });
      }, [status, video]);

      useEffect(() => {
        const videoEl = videoRef.current;
        const canvasEl = canvasRef.current;
        if (!videoEl || !canvasEl) return;

        let animId;

        const draw = () => {
          canvasEl.width  = canvasEl.offsetWidth;
          canvasEl.height = canvasEl.offsetHeight;
          const ctx = canvasEl.getContext('2d');
          ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
          if (!showAnnotations) return;

          const currentFrame = Math.round((videoEl.currentTime - blackDuration) * fps) + 1;
          const boxes = detections[currentFrame] || detections[String(currentFrame)] || [];
          if (!boxes.length) return;

          const rect = getVideoRect(videoEl, canvasEl);
          boxes.forEach(box => {
            if (visibleClusterIds && trackToCluster) {
              const cid = trackToCluster[String(box.track_id)];
              if (cid !== undefined && !visibleClusterIds.has(cid)) return;
            }
            const isSelected = selectedKeys && selectedKeys.has(`${video}__${box.track_id}`);
            const color = (trackColorMap && trackColorMap[String(box.track_id)]) || '#6B7280';
            const bx = rect.x + box.x * rect.w;
            const by = rect.y + box.y * rect.h;
            const bw = box.w * rect.w;
            const bh = box.h * rect.h;

            ctx.lineWidth   = isSelected ? 3 : 1.5;
            ctx.strokeStyle = isSelected ? '#FFFFFF' : color;
            if (isSelected) { ctx.shadowBlur = 8; ctx.shadowColor = color; }
            ctx.strokeRect(bx, by, bw, bh);
            ctx.shadowBlur = 0;

            const label  = `#${box.track_id}`;
            ctx.font     = '10px monospace';
            const tw     = ctx.measureText(label).width;
            const labelY = by > 14 ? by - 1 : by + bh + 13;
            ctx.fillStyle = isSelected ? '#FFFFFF' : color;
            ctx.fillRect(bx, labelY - 12, tw + 4, 13);
            ctx.fillStyle = '#000';
            ctx.fillText(label, bx + 2, labelY - 1);
          });
        };

        const loop = () => { draw(); animId = requestAnimationFrame(loop); };
        const startLoop = () => { animId = requestAnimationFrame(loop); };
        const stopLoop  = () => cancelAnimationFrame(animId);

        const onPlay   = () => startLoop();
        const onPause  = () => { stopLoop(); draw(); };
        const onSeeked = () => draw();
        const onEnded  = () => { stopLoop(); draw(); };

        videoEl.addEventListener('play',   onPlay);
        videoEl.addEventListener('pause',  onPause);
        videoEl.addEventListener('seeked', onSeeked);
        videoEl.addEventListener('ended',  onEnded);

        if (!videoEl.paused) startLoop(); else draw();

        return () => {
          stopLoop();
          videoEl.removeEventListener('play',   onPlay);
          videoEl.removeEventListener('pause',  onPause);
          videoEl.removeEventListener('seeked', onSeeked);
          videoEl.removeEventListener('ended',  onEnded);
        };
      }, [detections, fps, blackDuration, showAnnotations, selectedKeys, trackColorMap, visibleClusterIds, trackToCluster, video]);

      return (
        <div className="flex items-center justify-center"
          style={{height, flex: 1, minWidth: 0, backgroundColor: C.bg, position: 'relative'}}>
          {status === 'ready' ? (<>
            <video
              ref={videoRef}
              key={video}
              src={`/api/video/${video}/proxy`}
              controls muted
              style={{height: '100%', maxWidth: '100%', objectFit: 'contain'}}
            />
            <canvas
              ref={canvasRef}
              style={{position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none'}}
            />
          </>) : (
            <div className="flex flex-col items-center gap-2" style={{color: 'var(--text-faint)'}}>
              {status === 'error'
                ? <span className="text-xs">Failed to load video</span>
                : <>
                    <svg className="animate-spin" style={{width:16,height:16,color:C.accent}} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                      <circle style={{opacity:0.25}} cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                      <path style={{opacity:0.75}} fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                    </svg>
                    <span className="text-xs">{status === 'generating' ? 'Generating proxy…' : 'Loading…'}</span>
                  </>
              }
            </div>
          )}
        </div>
      );
    }

    // ── ClusterFilterPanel ────────────────────────────────────────────────────

    function ClusterFilterPanel({ clusters, tracks, visibleClusterIds, onToggle, onToggleAll, onStatsClick }) {
      const countByCluster = {};
      tracks.forEach(t => { countByCluster[t.cluster_id] = (countByCluster[t.cluster_id] || 0) + 1; });

      const videoClusters = clusters.filter(c => countByCluster[c.id] > 0);
      const allVisible = videoClusters.length > 0 && videoClusters.every(c => visibleClusterIds.has(c.id));

      return (
        <div className="flex flex-col flex-shrink-0 overflow-hidden"
          style={{width: 220, backgroundColor: C.bg, paddingLeft: 12}}>
          <div className="flex items-center justify-between px-3 py-2.5 border-b flex-shrink-0"
            style={{borderColor: C.border}}>
            <span className="text-[13px] font-semibold uppercase tracking-wider" style={{color: 'var(--text-secondary)'}}>Show Annotations</span>
            {videoClusters.length > 0 && (
              <button
                onClick={e => { e.stopPropagation(); onToggleAll(allVisible); }}
                className="btn-ghost"
                style={{padding: '3px 10px', fontSize: 12, color: allVisible ? C.accent : 'var(--text-muted)', borderColor: allVisible ? C.accent : 'var(--border-subtle)'}}
              >
                {allVisible ? 'Hide All' : 'Show All'}
              </button>
            )}
          </div>
          <div className="overflow-y-auto flex-1 py-1">
            {videoClusters.map(c => {
              const count = countByCluster[c.id] || 0;
              const checked = visibleClusterIds.has(c.id);
              return (
                <div
                  key={c.id}
                  className="flex items-center gap-2 px-3 py-2 cursor-pointer select-none"
                  style={{opacity: checked ? 1 : 0.4}}
                  onClick={e => { e.stopPropagation(); onToggle(c.id); }}
                >
                  <div
                    className="w-4 h-4 rounded-sm flex-shrink-0"
                    style={{
                      backgroundColor: checked ? c.color : 'transparent',
                      border: `2px solid ${c.color}`,
                      transition: 'background-color 0.1s',
                    }}
                  />
                  <span className="text-[14px] truncate flex-1 min-w-0" style={{color: 'var(--text-primary)'}}>{c.name}</span>
                  <span className="font-mono text-[13px] flex-shrink-0" style={{color: 'var(--text-faint)'}}>{count}</span>
                </div>
              );
            })}
          </div>
          <div className="flex-shrink-0 border-t p-2.5 pr-4" style={{borderColor: C.border}}>
            <button
              onClick={e => { e.stopPropagation(); onStatsClick(); }}
              className="w-full flex items-center gap-2 px-2.5 py-2 rounded-md text-[12px] font-medium transition-colors"
              style={{
                color: C.accent,
                backgroundColor: 'var(--accent-glow)',
                border: `1px solid var(--accent-dim)`,
                cursor: 'pointer',
                fontFamily: 'inherit',
              }}
            >
              <Icons.BarChart2 size={13}/>
              Video Statistics
            </button>
          </div>
        </div>
      );
    }

    // ── ContextMenu ───────────────────────────────────────────────────────────

    function ContextMenu({ trackKey, x, y, currentClusterId, clusters, onSelect, onNewCluster, onView, onTrash, onClose }) {
      useEffect(() => {
        const onMouseDown = () => onClose();
        const onKeyDown = e => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('keydown', onKeyDown);
        return () => {
          window.removeEventListener('mousedown', onMouseDown);
          window.removeEventListener('keydown', onKeyDown);
        };
      }, [onClose]);

      const menuW = 196, itemH = 32, headerH = 34;
      const totalH = itemH + 9 + itemH + 9 + headerH + clusters.length * itemH + 9 + itemH + 8;
      const left = Math.min(x, window.innerWidth  - menuW - 8);
      const top  = Math.min(y, window.innerHeight - totalH - 8);

      return (
        <div
          className="fixed z-50 rounded-lg shadow-2xl py-1"
          style={{left, top, width: menuW, backgroundColor: 'var(--bg-surface-2)', border: `1px solid var(--border-moderate)`}}
          onMouseDown={e => e.stopPropagation()}
        >
          <button
            onClick={() => { onView(trackKey); onClose(); }}
            className="w-full flex items-center gap-2 px-3 text-xs text-left transition-colors hover:bg-slate-800"
            style={{height: itemH, color: 'var(--text-secondary)'}}
          >
            <Icons.Search size={12}/>
            <span>View crop</span>
          </button>
          <button
            onClick={() => { onTrash(trackKey); onClose(); }}
            className="w-full flex items-center gap-2 px-3 text-xs text-left transition-colors hover:bg-red-900"
            style={{height: itemH, color: 'var(--error)'}}
          >
            <Icons.Trash2 size={12}/>
            <span>Move to trash</span>
          </button>
          <div style={{borderTop: `1px solid var(--border-subtle)`, margin: '4px 0'}} />
          <div className="px-3 py-1.5 label-caps">
            Move to cluster
          </div>
          {clusters.map(cluster => (
            <button
              key={cluster.id}
              onClick={() => { onSelect(trackKey, cluster.id); onClose(); }}
              className="w-full flex items-center gap-2 px-3 text-xs text-left transition-colors hover:bg-slate-800"
              style={{height: itemH, backgroundColor: cluster.id === currentClusterId ? 'var(--border-subtle)' : 'transparent'}}
            >
              <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{backgroundColor: cluster.color}} />
              <span className="truncate flex-1">{cluster.name}</span>
              {cluster.id === currentClusterId && <span style={{color: 'var(--text-muted)', display:'inline-flex'}}><Icons.Check size={11}/></span>}
            </button>
          ))}
          <div style={{borderTop: `1px solid var(--border-subtle)`, margin: '4px 0'}} />
          <button
            onClick={() => { onNewCluster(trackKey); onClose(); }}
            className="w-full flex items-center gap-2 px-3 text-xs text-left transition-colors hover:bg-slate-800"
            style={{height: itemH, color: C.accent}}
          >
            <Icons.Plus size={12}/>
            <span>New cluster</span>
          </button>
        </div>
      );
    }

    // ── CropCard ──────────────────────────────────────────────────────────────

    function CropCard({ trackKey, clusterId, color, compact, onContextMenu, selected, onSelect, selectedKeys, onDrop }) {
      const [dragOver, setDragOver] = React.useState(false);
      return (
        <div
          draggable
          onDragStart={e => {
            e.dataTransfer.setData('trackKeys', JSON.stringify([trackKey]));
          }}
          onDragOver={e => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          onDrop={e => {
            e.preventDefault(); e.stopPropagation(); setDragOver(false);
            if (!onDrop || !clusterId) return;
            const keys = JSON.parse(e.dataTransfer.getData('trackKeys') || '[]');
            if (keys.length) onDrop(keys, clusterId);
          }}
          onClick={e => { e.stopPropagation(); onSelect && onSelect(trackKey); }}
          onContextMenu={e => { e.preventDefault(); if (onContextMenu) onContextMenu(trackKey, e.clientX, e.clientY); }}
          className="flex-shrink-0 rounded overflow-hidden"
          style={{
            border: `2px solid ${dragOver ? (color || C.accent) : (selected ? '#fff' : (color || 'var(--text-faint)'))}`,
            boxShadow: dragOver ? `0 0 0 3px ${color || C.accent}` : (selected ? `0 0 0 2px ${color || C.accent}` : 'none'),
            width: compact ? 90 : 96,
            cursor: 'grab',
          }}
          title={trackKey}
        >
          <img
            src={cropUrl(trackKey)}
            alt={trackKey}
            draggable={false}
            style={{width: '100%', height: compact ? 69 : 76, objectFit: 'cover', display: 'block'}}
            onError={e => { e.target.style.background = 'var(--bg-surface-3)'; e.target.style.height = compact ? '69px' : '76px'; }}
          />
          {!compact && (
            <div className="px-1 py-0.5 font-mono text-[10px] truncate" style={{backgroundColor: 'var(--border-subtle)', color: 'var(--text-secondary)'}}>
              {trackKey.split('__')[1]}
            </div>
          )}
        </div>
      );
    }

    // ── ClusterRow ────────────────────────────────────────────────────────────

    function ClusterRow({ cluster, tracks, onContextMenu, onDrop, selectedKeys, onSelect }) {
      const [over, setOver] = useState(false);
      const [expanded, setExpanded] = useState(false);
      const initialized = useRef(false);

      useEffect(() => {
        if (!initialized.current && tracks.length > 0) {
          initialized.current = true;
          setExpanded(true);
        }
      }, [tracks]);

      return (
        <div
          className="flex-shrink-0 border-b"
          style={{borderColor: C.border}}
          onDragOver={e => { e.preventDefault(); setOver(true); }}
          onDragLeave={() => setOver(false)}
          onDrop={e => {
            e.preventDefault(); setOver(false);
            const keys = JSON.parse(e.dataTransfer.getData('trackKeys') || '[]');
            if (keys.length) onDrop(keys, cluster.id);
          }}
        >
          <div
            className="flex items-center gap-2 px-3 py-1.5 cursor-pointer select-none"
            style={{
              borderLeft: `3px solid ${over ? cluster.color : 'transparent'}`,
              backgroundColor: over ? `${cluster.color}10` : 'transparent',
              transition: 'background-color 0.15s, border-color 0.15s',
            }}
            onClick={() => setExpanded(e => !e)}
          >
            <span style={{
              color: 'var(--text-faint)',
              display: 'inline-flex',
              transform: expanded ? 'rotate(90deg)' : 'rotate(0deg)',
              transition: 'transform 0.15s',
            }}><Icons.ChevronRight size={10}/></span>
            <div className="w-2 h-2 rounded-full flex-shrink-0" style={{backgroundColor: cluster.color}} />
            <span className="text-[13px] font-semibold" style={{color: 'var(--text-secondary)'}}>{cluster.name}</span>
            <span className="font-mono text-[11px]" style={{color: 'var(--text-faint)'}}>{tracks.length}</span>
          </div>
          {expanded && (

              className="flex flex-wrap gap-2 px-3 pb-2"

                      onContextMenu={(key, x, y) => onContextMenu(key, x, y, cluster.id)} onDrop={onDrop} />

            </div>

      return (

      return (

    // ── ClusterCard ───────────────────────────────────────────────────────────

    function ClusterCard({ cluster, onClick, onDrop, onRename }) {
      const [over, setOver] = useState(false);
      const [editing, setEditing] = useState(false);
      const [name, setName] = useState(cluster.name);

      useEffect(() => { setName(cluster.name); }, [cluster.name]);

      const submitRename = () => {
        setEditing(false);
        const trimmed = name.trim();
        if (trimmed && trimmed !== cluster.name) onRename(cluster.id, trimmed);
        else setName(cluster.name);
      };

      return (
        <div
          onClick={() => !editing && onClick(cluster.id)}
          onDragOver={e => { e.preventDefault(); setOver(true); }}
          onDragLeave={() => setOver(false)}
          onDrop={e => { e.preventDefault(); setOver(false); const keys = JSON.parse(e.dataTransfer.getData('trackKeys') || '[]'); if (keys.length) onDrop(keys, cluster.id); }}
          className="cluster-card rounded-lg p-3 cursor-pointer"
          style={{
            backgroundColor: C.card,
            border: `2px solid ${over ? cluster.color : 'var(--border-subtle)'}`,

              <span
                className="text-[13px] font-semibold truncate"
                style={{color: 'var(--text-primary)'}}

              </button>

                  {videoName}
                  <span className="ml-2 font-normal" style={{color: 'var(--text-ghost)'}}>{byVideo[videoName].length}</span>
                </div>
                <div className="flex flex-wrap gap-2">
                  {byVideo[videoName].map(key => (
                    <CropCard key={key} trackKey={key} clusterId={cluster.id} color={cluster.color} compact={false}
                      selected={selectedKeys?.has(key)} onSelect={onSelect} selectedKeys={selectedKeys}
                      onContextMenu={(k, x, y) => onContextMenu(k, x, y, cluster.id)} onDrop={onDrop} />
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── TrashModal ────────────────────────────────────────────────────────────

    function TrashModal({ trash, onClose, onRestore, onDelete }) {
      const { track_keys = [], metadata = {} } = trash;
      const [selected, setSelected] = useState(new Set());

      const toggleSelect = key => {
        setSelected(prev => {
          const next = new Set(prev);
          if (next.has(key)) next.delete(key); else next.add(key);
          return next;
        });
      };

      const byCluster = {};
      track_keys.forEach(key => {
        const meta = metadata[key] || {};
        const label = meta.source_cluster_name || meta.source_cluster_id || 'Unknown';
        (byCluster[label] = byCluster[label] || []).push(key);
      });
      const clusterLabels = Object.keys(byCluster).sort();

      const selCount = selected.size;
      const targets = selCount > 0 ? [...selected] : [];

      const handleRestore = () => {
        onRestore(targets);
        setSelected(new Set());
      };

      const handleDelete = () => {
        if (!window.confirm(`Permanently delete ${selCount} crop(s)? This cannot be undone.`)) return;
        onDelete(targets);
        setSelected(new Set());
      };

      const allSelected = track_keys.length > 0 && selected.size === track_keys.length;

      const handleSelectAll = () => {
        setSelected(allSelected ? new Set() : new Set(track_keys));
      };

      return (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center modal-backdrop"
          style={{backgroundColor: 'var(--bg-overlay)', backdropFilter: 'blur(6px)'}}
          onClick={onClose}
        >
          <div
            className="modal-content rounded-xl p-5 mx-6 overflow-y-auto relative"
            style={{backgroundColor: 'var(--bg-surface-2)', border: '2px solid var(--error-border)', maxWidth: 820, width: '100%', maxHeight: '85vh', boxShadow: 'var(--shadow-modal)'}}
            onClick={e => e.stopPropagation()}
          >
            <div className="flex items-center gap-3 mb-3">
              <span style={{color: 'var(--error)', display: 'inline-flex'}}><Icons.Trash2 size={16}/></span>
              <span className="text-lg font-semibold" style={{color: 'var(--text-primary)'}}>Trash</span>
              <span className="font-mono text-[12px]" style={{color: 'var(--text-muted)'}}>({track_keys.length} item{track_keys.length !== 1 ? 's' : ''})</span>
              <div className="ml-auto flex items-center gap-2">
                {track_keys.length > 0 && (
                  <button onClick={handleSelectAll} className="btn-secondary" style={{padding: '3px 10px', fontSize: 11}}>
                    {allSelected ? 'Deselect All' : 'Select All'}
                  </button>
                )}
                <button onClick={onClose} className="btn-icon ml-1">
                  <Icons.X size={16}/>
                </button>
              </div>
            </div>

            {track_keys.length > 0 && (
              <div className="flex items-center gap-2 mb-4 px-3 py-2 rounded" style={{backgroundColor: C.bg}}>
                <span className="text-xs" style={{color: 'var(--text-muted)'}}>
                  {selCount === 0 ? 'Click crops to select' : `${selCount} selected`}
                </span>
                <div className="ml-auto flex gap-2">
                  <button onClick={handleRestore} disabled={selCount === 0} className="btn-secondary" style={{padding: '3px 10px', fontSize: 11}}>
                    Restore
                  </button>
                  <button onClick={handleDelete} disabled={selCount === 0} className="btn-danger" style={{padding: '3px 10px', fontSize: 11}}>
                    Delete Forever
                  </button>
                </div>
              </div>
            )}

            {track_keys.length === 0 ? (
              <div className="flex items-center justify-center py-16" style={{color: 'var(--text-ghost)'}}>
                <span className="text-sm">Trash is empty</span>
              </div>
            ) : (
              clusterLabels.map(label => (
                <div key={label} className="mb-6">
                  <div className="font-mono text-[11px] font-semibold mb-2 pb-1 border-b" style={{color: 'var(--text-muted)', borderColor: C.border}}>
                    From: {label}
                    <span className="ml-2 font-normal" style={{color: 'var(--text-ghost)'}}>{byCluster[label].length}</span>
                  </div>
                  <div className="flex flex-wrap gap-3">
                    {byCluster[label].map(key => {
                      const isSel = selected.has(key);
                      return (
                      <div
                        key={key}
                        onClick={() => toggleSelect(key)}
                        className="rounded overflow-hidden"
                        style={{
                          border: `2px solid ${isSel ? '#fff' : 'var(--error-border)'}`,
                          boxShadow: isSel ? '0 0 0 2px var(--error)' : 'none',
                          width: 96,
                          cursor: 'pointer',
                        }}
                        title={key}
                      >
                        <img
                          src={cropUrl(key)}
                          alt={key}
                          draggable={false}
                          style={{width: '100%', height: 76, objectFit: 'cover', display: 'block'}}
                          onError={e => { e.target.style.background = 'var(--bg-surface-3)'; e.target.style.height = '76px'; }}
                        />
                        <div className="px-1 py-0.5 font-mono text-[10px] truncate" style={{backgroundColor: 'var(--border-subtle)', color: 'var(--text-secondary)'}}>
                          {key.split('__')[1]}
                        </div>
                      </div>
                    );
                    })}
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // ── Video Statistics charts ───────────────────────────────────────────────

    function gaussianSmooth(values, sigma) {
      if (sigma === 0) return values;
      const radius = Math.ceil(sigma * 3);
      const kernel = [];
      let kernelSum = 0;
      for (let i = -radius; i <= radius; i++) {
        const w = Math.exp(-(i * i) / (2 * sigma * sigma));
        kernel.push(w);
        kernelSum += w;
      }
      const norm = kernel.map(w => w / kernelSum);
      return values.map((_, idx) => {
        let sum = 0;
        for (let k = 0; k < norm.length; k++) {
          const j = Math.max(0, Math.min(values.length - 1, idx - radius + k));
          sum += values[j] * norm[k];
        }
        return sum;
      });
    }

    function TracksChart({ framesData, clusterMeta }) {
      const [sigma, setSigma] = useState(3);

      if (!framesData.length) return <div className="flex items-center justify-center py-20 text-sm" style={{color:'var(--text-faint)'}}>No detection data for this video</div>;

      const W = 720, H = 300;
      const pad = {l: 48, r: 24, t: 20, b: 44};
      const pw = W - pad.l - pad.r, ph = H - pad.t - pad.b;
      const frames = framesData.map(d => d.frame);
      const minF = frames[0], maxF = frames[frames.length - 1];
      const frameRange = maxF - minF || 1;
      const maxCount = Math.max(1, ...clusterMeta.map(c => Math.max(...framesData.map(d => d[c.id] || 0))));
      const xS = f => pad.l + ((f - minF) / frameRange) * pw;
      const yS = v => pad.t + ph - (v / maxCount) * ph;
      const yTickVals = Array.from({length: 6}, (_, i) => Math.round((maxCount / 5) * i));
      const xTickFrames = Array.from({length: 6}, (_, i) => Math.round(minF + frameRange * i / 5));

      return (
        <div>
          <div className="flex items-center justify-between mb-4">
            <p className="text-[12px]" style={{color:'var(--text-muted)'}}>Number of distinct tracks visible per cluster across every detection frame</p>
            <div className="flex items-center gap-2 flex-shrink-0 ml-4">
              <span className="label-caps" style={{whiteSpace:'nowrap'}}>Smoothing σ</span>
              <input
                type="range" min="0" max="15" step="0.5"
                value={sigma}
                onChange={e => setSigma(+e.target.value)}
                style={{width: 80}}
              />
              <span className="font-mono text-[11px]" style={{color: C.accent, minWidth: 24}}>{sigma}</span>
            </div>
          </div>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',overflow:'visible'}}>
            {yTickVals.map((v, i) => (
              <g key={i}>
                <line x1={pad.l} y1={yS(v)} x2={W-pad.r} y2={yS(v)} stroke="#1e3a5f" strokeWidth={1} strokeDasharray={v===0?undefined:'4,4'}/>
                <text x={pad.l-8} y={yS(v)+4} textAnchor="end" fontSize={10} fill="#475569">{v}</text>
              </g>
            ))}
            {xTickFrames.map((f, i) => (
              <text key={i} x={xS(f)} y={H-pad.b+16} textAnchor="middle" fontSize={10} fill="#475569">{f}</text>
            ))}
            {clusterMeta.map(c => {
              const raw = framesData.map(d => d[c.id] || 0);
              const smoothed = gaussianSmooth(raw, sigma);
              const pts = framesData.map((d, i) => `${xS(d.frame).toFixed(1)},${yS(smoothed[i]).toFixed(1)}`).join(' ');
              return <polyline key={c.id} points={pts} fill="none" stroke={c.color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" opacity={0.9}/>;
            })}
            <line x1={pad.l} y1={pad.t} x2={pad.l} y2={pad.t+ph} stroke="#334155" strokeWidth={1.5}/>
            <line x1={pad.l} y1={pad.t+ph} x2={W-pad.r} y2={pad.t+ph} stroke="#334155" strokeWidth={1.5}/>
            <text x={13} y={pad.t+ph/2} textAnchor="middle" fontSize={10} fill="#475569" transform={`rotate(-90,13,${pad.t+ph/2})`}>Tracks</text>
            <text x={pad.l+pw/2} y={H-2} textAnchor="middle" fontSize={10} fill="#475569">Frame</text>
          </svg>
          <div className="flex flex-wrap gap-5 mt-4">
            {clusterMeta.map(c => (
              <div key={c.id} className="flex items-center gap-2">
                <div style={{width:14,height:3,borderRadius:2,backgroundColor:c.color,flexShrink:0}}/>
                <span className="text-[12px]" style={{color:'var(--text-secondary)'}}>{c.name}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SpeciesChart({ entries }) {
      const sorted = [...entries].sort((a, b) => b.count - a.count);
      const total = sorted.reduce((s, e) => s + e.count, 0);
      if (!total) return <div className="flex items-center justify-center py-20 text-sm" style={{color:'var(--text-faint)'}}>No cluster data for this video</div>;

      const cx = 130, cy = 130, outerR = 100, innerR = 58;
      const donutSlice = (startA, endA) => {
        const [cos, sin] = [Math.cos, Math.sin];
        const x1=cx+outerR*cos(startA), y1=cy+outerR*sin(startA);
        const x2=cx+outerR*cos(endA),   y2=cy+outerR*sin(endA);
        const x3=cx+innerR*cos(endA),   y3=cy+innerR*sin(endA);
        const x4=cx+innerR*cos(startA), y4=cy+innerR*sin(startA);
        const large = endA-startA > Math.PI ? 1 : 0;
        return `M${x1.toFixed(2)} ${y1.toFixed(2)} A${outerR} ${outerR} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} L${x3.toFixed(2)} ${y3.toFixed(2)} A${innerR} ${innerR} 0 ${large} 0 ${x4.toFixed(2)} ${y4.toFixed(2)}Z`;
      };

      let angle = -Math.PI / 2;
      const slices = sorted.map(e => {
        const sweep = (e.count / total) * 2 * Math.PI;
        const path = donutSlice(angle, angle + sweep);
        angle += sweep;
        return { ...e, path };
      });

      return (
        <div className="flex items-center gap-10 flex-wrap">
          <svg viewBox="0 0 260 260" style={{width:240,flexShrink:0}}>
            {slices.map((s, i) => <path key={i} d={s.path} fill={s.color} opacity={0.9}/>)}
            <text x={cx} y={cy-8} textAnchor="middle" fontSize={24} fontWeight="700" fill="#f1f5f9">{total.toLocaleString()}</text>
            <text x={cx} y={cy+14} textAnchor="middle" fontSize={11} fill="#64748b">tracks</text>
          </svg>
          <div className="flex flex-col gap-3">
            {slices.map((s, i) => (
              <div key={i} className="flex items-center gap-3">
                <div style={{width:14,height:14,borderRadius:3,backgroundColor:s.color,flexShrink:0}}/>
                <div>
                  <div className="text-[13px] font-medium" style={{color:'var(--text-primary)'}}>{s.name}</div>
                  <div className="font-mono text-[11px]" style={{color:'var(--text-faint)'}}>
                    {s.count.toLocaleString()} · {((s.count/total)*100).toFixed(1)}%
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ConfidenceChart({ timeline }) {
      if (!timeline.length) return <div className="flex items-center justify-center py-20 text-sm" style={{color:'var(--text-faint)'}}>No confidence data</div>;

      const W = 720, H = 260;
      const pad = {l: 52, r: 24, t: 20, b: 44};
      const pw = W-pad.l-pad.r, ph = H-pad.t-pad.b;
      const frames = timeline.map(d => d.frame);
      const minF = frames[0], maxF = frames[frames.length-1];
      const frameRange = maxF - minF || 1;
      const xS = f => pad.l + ((f-minF)/frameRange)*pw;
      const yS = v => pad.t + ph - v*ph;
      const xTickFrames = Array.from({length:6}, (_,i) => Math.round(minF + frameRange*i/5));
      const yTickVals = [0, 0.25, 0.5, 0.75, 1.0];
      const topPts = timeline.map(d => `${xS(d.frame).toFixed(1)},${yS(d.avg_conf).toFixed(1)}`).join(' ');
      const areaPoints = [
        `${xS(frames[0]).toFixed(1)},${yS(0).toFixed(1)}`,
        ...timeline.map(d => `${xS(d.frame).toFixed(1)},${yS(d.avg_conf).toFixed(1)}`),
        `${xS(frames[frames.length-1]).toFixed(1)},${yS(0).toFixed(1)}`,
      ].join(' ');

      return (
        <div>
          <p className="text-[12px] mb-4" style={{color:'var(--text-muted)'}}>Average detection confidence per frame — higher values mean the model is more certain about its detections</p>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
            <defs>
              <linearGradient id="confGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={C.accent} stopOpacity="0.4"/>
                <stop offset="100%" stopColor={C.accent} stopOpacity="0.03"/>
              </linearGradient>

                <text x={pad.l-8} y={yS(v)+4} textAnchor="end" fontSize={10} fill="#475569">{v.toFixed(2)}</text>
              </g>
            ))}
            {xTickFrames.map((f,i) => (
              <text key={i} x={xS(f)} y={H-pad.b+16} textAnchor="middle" fontSize={10} fill="#475569">{f}</text>
            ))}
            <polygon points={areaPoints} fill="url(#confGrad)"/>
            <polyline points={topPts} fill="none" stroke={C.accent} strokeWidth={2} strokeLinejoin="round"/>
            <line x1={pad.l} y1={pad.t} x2={pad.l} y2={pad.t+ph} stroke="#334155" strokeWidth={1.5}/>
            <line x1={pad.l} y1={pad.t+ph} x2={W-pad.r} y2={pad.t+ph} stroke="#334155" strokeWidth={1.5}/>
            <text x={13} y={pad.t+ph/2} textAnchor="middle" fontSize={10} fill="#475569" transform={`rotate(-90,13,${pad.t+ph/2})`}>Confidence</text>
            <text x={pad.l+pw/2} y={H-2} textAnchor="middle" fontSize={10} fill="#475569">Frame</text>
          </svg>

    function SpatialHeatmap({ heatmap }) {
      if (!heatmap.length) return <div className="flex items-center justify-center py-20 text-sm" style={{color:'var(--text-faint)'}}>No spatial data</div>;

      const GRID = 10, cellW = 48, cellH = 27;
      const W = GRID*cellW, H = GRID*cellH;
      const maxCount = Math.max(...heatmap.map(h => h.count), 1);
      const grid = {};
      heatmap.forEach(h => { grid[`${h.gx},${h.gy}`] = h.count; });

      return (
        <div>
          <p className="text-[12px] mb-4" style={{color:'var(--text-muted)'}}>Spatial distribution of all detections across the video frame — each cell represents a 10% × 10% region</p>
          <div className="flex gap-8 items-start flex-wrap">
            <div style={{flexShrink:0}}>
              <div className="font-mono text-[10px] mb-2 text-center" style={{color:'var(--text-faint)'}}>← video frame area →</div>
              <svg viewBox={`0 0 ${W} ${H}`} style={{width:W,height:H,border:'1px solid #1e3a5f',borderRadius:4}}>
                {Array.from({length:GRID}).flatMap((_,gy) =>
                  Array.from({length:GRID}).map((_,gx) => {
                    const count = grid[`${gx},${gy}`] || 0;
                    const opacity = count > 0 ? 0.1 + 0.9*(count/maxCount) : 0;
                    return (
                      <g key={`${gx}-${gy}`}>
                        <rect x={gx*cellW} y={gy*cellH} width={cellW} height={cellH} fill={C.accent} fillOpacity={opacity}/>
                        <rect x={gx*cellW} y={gy*cellH} width={cellW} height={cellH} fill="none" stroke="#0a1a2e" strokeWidth={0.5}/>
                        {count > 0 && (
                          <text x={gx*cellW+cellW/2} y={gy*cellH+cellH/2+3.5} textAnchor="middle" fontSize={8}
                            fill={opacity > 0.55 ? '#0f172a' : '#94a3b8'} fontFamily="monospace">{count}</text>
                        )}
                      </g>
                    );
                  })
                )}
              </svg>
            </div>
            <div className="flex flex-col gap-1.5 pt-8">
              <span className="label-caps mb-1">Density scale</span>
              {[1.0, 0.75, 0.5, 0.25, 0.05].map((t, i) => (
                <div key={i} className="flex items-center gap-2">
                  <div style={{width:22,height:13,borderRadius:2,backgroundColor:C.accent,opacity:0.1+0.9*t,flexShrink:0}}/>
                  <span className="font-mono text-[11px]" style={{color:'var(--text-faint)'}}>{Math.round(maxCount*t)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function DurationHistogram({ durations }) {
      if (!durations.length) return <div className="flex items-center justify-center py-20 text-sm" style={{color:'var(--text-faint)'}}>No track duration data</div>;

      const BINS = 12;
      const maxDur = Math.max(...durations), minDur = Math.min(...durations);
      const range = maxDur - minDur || 1;
      const binSize = Math.ceil(range / BINS);
      const bins = Array.from({length:BINS}, (_,i) => ({label: minDur + i*binSize, count:0}));
      durations.forEach(d => { bins[Math.min(Math.floor((d-minDur)/binSize), BINS-1)].count++; });

      const W = 720, H = 260;
      const pad = {l:52, r:24, t:20, b:54};
      const pw = W-pad.l-pad.r, ph = H-pad.t-pad.b;
      const barW = pw/BINS, gap = 3;
      const maxBin = Math.max(...bins.map(b=>b.count), 1);
      const yS = v => pad.t + ph - (v/maxBin)*ph;
      const yTicks = [0, 0.25, 0.5, 0.75, 1.0].map(t => Math.round(maxBin*t));
      const avg = Math.round(durations.reduce((a,b)=>a+b,0)/durations.length);

      return (
        <div>
          <p className="text-[12px] mb-4" style={{color:'var(--text-muted)'}}>Distribution of how many frames each tracked animal remained visible — longer durations indicate animals moving through the full frame</p>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
            {yTicks.map((v,i) => (
              <g key={i}>
                <line x1={pad.l} y1={yS(v)} x2={W-pad.r} y2={yS(v)} stroke="#1e3a5f" strokeWidth={1} strokeDasharray={v===0?undefined:'4,4'}/>
                <text x={pad.l-8} y={yS(v)+4} textAnchor="end" fontSize={10} fill="#475569">{v}</text>
              </g>
            ))}
            {bins.map((b,i) => {
              const x = pad.l + i*barW + gap/2;
              const bw = barW - gap;
              const bh = (b.count/maxBin)*ph;
              const by = pad.t + ph - bh;
              return (
                <g key={i}>
                  <rect x={x} y={by} width={bw} height={Math.max(bh,0)} fill={C.accent} fillOpacity={0.7} rx={2}/>
                  {b.count > 0 && bh > 16 && (
                    <text x={x+bw/2} y={by+13} textAnchor="middle" fontSize={9} fill="#0f172a">{b.count}</text>
                  )}
                  <text x={x+bw/2} y={H-pad.b+16} textAnchor="middle" fontSize={9} fill="#475569"
                    transform={b.label > 99 ? `rotate(-35,${x+bw/2},${H-pad.b+16})` : undefined}>{b.label}</text>
                </g>
              );
            })}
            <line x1={pad.l} y1={pad.t} x2={pad.l} y2={pad.t+ph} stroke="#334155" strokeWidth={1.5}/>
            <line x1={pad.l} y1={pad.t+ph} x2={W-pad.r} y2={pad.t+ph} stroke="#334155" strokeWidth={1.5}/>
            <text x={13} y={pad.t+ph/2} textAnchor="middle" fontSize={10} fill="#475569" transform={`rotate(-90,13,${pad.t+ph/2})`}>Tracks</text>
            <text x={pad.l+pw/2} y={H-4} textAnchor="middle" fontSize={10} fill="#475569">Duration (frames)</text>
          </svg>
          <div className="flex gap-6 mt-4 font-mono text-[11px]" style={{color:'var(--text-muted)'}}>
            <span>Total: <span style={{color:C.accent}}>{durations.length}</span> tracks</span>
            <span>Min: <span style={{color:C.accent}}>{minDur}</span> frames</span>
            <span>Max: <span style={{color:C.accent}}>{maxDur}</span> frames</span>
            <span>Avg: <span style={{color:C.accent}}>{avg}</span> frames</span>
          </div>
        </div>
      );
    }

      const submit = async () => {

        finally { setLoading(false); }

      return (
        <div className="flex-1 flex items-center justify-center p-6">
          <div className="w-full max-w-sm rounded-xl p-8 space-y-5" style={{backgroundColor: C.card, border: `1px solid var(--border-subtle)`, boxShadow: 'var(--shadow-elevated)'}}>

    const STAGES = ["downloading", "resizing", "detecting", "cropping", "embedding", "done"];

    function StagePip({ stage, current }) {
      const idx    = STAGES.indexOf(stage);
      const curIdx = STAGES.indexOf(current);
      const done   = curIdx > idx;
      const active = curIdx === idx;
      return (
        <div
          className="px-2 py-0.5 rounded-full font-medium border"
          style={{
            fontSize: 10,
            backgroundColor: done ? 'var(--success-bg)' : active ? 'var(--accent-glow)' : 'var(--bg-surface-3)',
            borderColor:     done ? 'var(--success-border)' : active ? C.accent : 'var(--border-subtle)',
            color:           done ? 'var(--success)' : active ? C.accent : 'var(--text-faint)',
            transition: 'all 0.3s',
          }}
        >
          {stage}
        </div>
      );
    }
